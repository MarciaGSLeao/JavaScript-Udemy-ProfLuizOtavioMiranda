<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulário</title>
  </head>
  <body>
    <section>
      <form action="#" method="get" target="_blank" autocomplete="off">
        <h1>Informações do Paciente</h1>
        <p>Informe corretamente os dados do paciente.</p>
        <fieldset>
          <legend>Dados Pessoais</legend>
          <label for="nome">Nome Completo:</label>
          <input type="text" id="nome" name="nome" placeholder="nome completo" required /><br /><br />

          <label for="date">Date:</label>
          <input type="date" id="date" name="date" required /><br /><br />
          <label for="datetime-local">Datetime:</label>
          <input type="datetime-local" id="datetime-local" name="datetime-local" required /><br /><br />
          <label for="time">Hora:</label>
          <input type="time" id="time" name="time" required /><br /><br />
          
          <label for="color">Cor Preferida:</label>
          <input type="color" id="color" name="color" required /><br /><br />

          <label for="idade">Idade:</label>
          <input type="number" id="idade" name="idade" required /><br /><br />

          <label for="sexo">Sexo:</label>
          <select id="sexo" name="sexo" required>
            <option value="" label="Choose an option" ></option>
            <!-- <option value="">Selecione</option> -->
            <option value="masculino">Masculino</option>
            <option value="feminino">Feminino</option>
            <option value="outro">Outro</option></select><br /><br />

          <label for="telefone">Telefone:</label>
          <input type="tel" id="telefone" name="telefone" /><br /><br />

          <label for="email">Email:</label>
          <input type="email" id="email" name="email" placeholder="ex.: email@email.com" /><br /><br />

          <label for="file">Foto:</label>
          <input type="file" id="file" name="file" accept=".png, .jpg, .jpeg, image/*" /><br /><br />

        </fieldset>
        <button type="reset">Limpar</button>
        <button type="submit">Enviar</button>
      </form>
    </section>
  </body>
</html>
